name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync (core + dev)
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src/
      - name: Test
        run: uv run pytest -q
